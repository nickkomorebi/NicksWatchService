services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data          # SQLite DB persisted here
      - ./secrets:/app/secrets    # GCP service account JSON
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
