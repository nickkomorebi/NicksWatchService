services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data                                          # SQLite DB + enrichment cache
      - ./secrets:/app/secrets                                    # GCP service account JSON
      - ./app/static/img/collection:/app/app/static/img/collection  # Persisted watch images
    env_file: .env
    restart: unless-stopped
    depends_on:
      - flaresolverr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
