<div class="space-y-2 mb-3">
  {% for comment in comments %}
  <div class="text-xs flex items-start justify-between group">
    <div>
      <div class="flex items-baseline gap-1.5">
        <span class="font-semibold text-gray-800">{{ comment.author_name }}</span>
        <span class="text-gray-400">{{ comment.created_at.strftime("%b %d, %Y") }}</span>
      </div>
      <p class="text-gray-600 mt-0.5 whitespace-pre-wrap break-words">{{ comment.body }}</p>
    </div>
    <button
      type="button"
      hx-delete="/listings/{{ listing_id }}/comments/{{ comment.id }}"
      hx-target="#comments-section-{{ listing_id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this comment?"
      class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 ml-2 flex-shrink-0 text-base leading-none">
      &times;
    </button>
  </div>
  {% else %}
  <p class="text-xs text-gray-400 italic">No comments yet.</p>
  {% endfor %}
</div>

<form
  hx-post="/listings/{{ listing_id }}/comments"
  hx-target="#comments-section-{{ listing_id }}"
  hx-swap="outerHTML"
  class="space-y-1.5">
  <input
    type="text"
    name="author_name"
    placeholder="Your name"
    required
    maxlength="100"
    class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:outline-none focus:border-blue-400" />
  <textarea
    name="body"
    placeholder="Add a comment…"
    required
    maxlength="2000"
    rows="2"
    class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:outline-none focus:border-blue-400 resize-none"></textarea>
  <button
    type="submit"
    class="text-xs bg-blue-600 text-white px-2.5 py-1 rounded hover:bg-blue-700 transition-colors">
    Post
  </button>
</form>
