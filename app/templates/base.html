<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NicksWatchService{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uodhrgzmkvbZci3YKgWl9Cd8i+dhMSVMzw" crossorigin="anonymous"></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="h-full">

  <nav class="bg-gray-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <a href="/" class="text-lg font-semibold tracking-tight">⌚ NicksWatchService</a>
      <div class="flex items-center gap-6 text-sm">
        <a href="/" class="hover:text-gray-300">Listings</a>
        <a href="/runs" class="hover:text-gray-300">Run History</a>
        <button
          hx-post="/partials/run-trigger"
          hx-headers='{"X-Run-Token": "{{ run_token }}"}'
          hx-target="#run-status-banner"
          hx-swap="outerHTML"
          hx-disabled-elt="this"
          class="bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white text-xs font-medium px-3 py-1.5 rounded">
          Run Now
        </button>
      </div>
    </div>
  </nav>

  <div id="run-status-banner"
       hx-get="/partials/run-status"
       hx-trigger="load, every 5s"
       hx-swap="outerHTML">
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="hidden fixed top-16 right-4 z-50 bg-amber-50 border border-amber-300 text-amber-800 text-sm px-4 py-3 rounded-lg shadow-lg max-w-xs"></div>

  <script>
    const RUN_TOKEN = "{{ run_token }}";
    document.body.addEventListener('showToast', (e) => {
      const t = document.getElementById('toast');
      t.textContent = e.detail;
      t.classList.remove('hidden');
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => {
        t.style.transition = 'opacity 0.4s';
        t.style.opacity = '0';
        setTimeout(() => { t.classList.add('hidden'); t.style.cssText = ''; }, 400);
      }, 4500);
    });
  </script>
</body>
</html>
